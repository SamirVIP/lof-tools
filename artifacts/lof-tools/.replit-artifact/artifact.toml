kind = "web"
previewPath = "/"
title = "LOF Tools"
version = "1.0.0"
id = "artifacts/lof-tools"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19298

[services.development]
run = "pnpm --filter @workspace/lof-tools run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lof-tools", "run", "build" ]
publicDir = "artifacts/lof-tools/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19298"
BASE_PATH = "/"
